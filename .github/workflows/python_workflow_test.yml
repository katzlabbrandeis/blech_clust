# GitHub Actions workflow for automated testing
# See: https://docs.github.com/en/actions
#
# This workflow runs Python tests on a self-hosted runner
# Jobs run sequentially within each workflow run (via needs:)
# Workflow-level concurrency ensures only one workflow runs at a time across all PRs

name: Python test
run-name: python_test
on:
  pull_request:
    paths:
      - '**.py'
      - '**.sh'
      - '.github/workflows/**'
      - 'utils/**/*.py'
      - 'utils/**/*.sh'
      - 'emg/**/*.py'
      - 'emg/**/*.sh'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  Preamble:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-test') }}
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          echo "Cleaning workspace to ensure fresh checkout"
          rm -rf ${{ github.workspace }}/*
          rm -rf ${{ github.workspace }}/.git
          rm -rf ${{ github.workspace }}/.github

      - run: pwd
      - run: which python
      - run: conda info --envs

      - name: Set up repo
        uses: actions/checkout@v4

      - run: git status
      - run: echo "${{ github.ref }} | ${{ github.repository }} | ${{ github.event.pull_request.title }}"

      - name: check labels
        run: echo "${{ github.event.pull_request.labels.*.name }}"

      - name: Check files in working-directory
        run: cd ${{ github.workspace }} && ls -la

      - name: Setup params
        run: make params

      - name: Check params
        run: ls -la params
      - name: Install blech_clust package
        run: make base test

  Spike-EMG:
    runs-on: self-hosted
    needs: Preamble
    # Test full pipeline with both spike sorting and EMG analysis
    steps:
      - name: Prefect SPIKE then EMG test
        shell: bash
        working-directory: ${{ github.workspace }}
        run: conda run --no-capture-output -n blech_clust python pipeline_testing/prefect_pipeline.py --spike-emg 2>&1 |
              tee ${{ github.workspace }}/github.log;
              if grep -q "ERROR" ${{ github.workspace }}/github.log; then
                echo "ERROR detected by bash";
                ./pipeline_testing/extract_traceback.sh ${{ github.workspace }}/github.log;
                exit 1;
              fi
  EMG-Only:
    runs-on: self-hosted
    needs: Spike-EMG
    # Test EMG analysis pipeline in isolation
    steps:
      - name: Prefect EMG only test
        shell: bash
        working-directory: ${{ github.workspace }}
        run: conda run --no-capture-output -n blech_clust python pipeline_testing/prefect_pipeline.py -e 2>&1 |
              tee ${{ github.workspace }}/github.log;
              if grep -q "ERROR" ${{ github.workspace }}/github.log; then
                echo "ERROR detected by bash";
                ./pipeline_testing/extract_traceback.sh ${{ github.workspace }}/github.log;
                exit 1;
              fi

      - name: Cleanup after tests
        if: always()
        run: |
          echo "Cleaning up working directory and test artifacts"
          rm -rf ${{ github.workspace }}/*
          rm -rf ${{ github.workspace }}/.git
          rm -rf ${{ github.workspace }}/.github
          echo "Note: Test data in ~/.blech_clust_test_data is preserved for reuse"
